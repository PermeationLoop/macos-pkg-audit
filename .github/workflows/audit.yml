name: "PKG Security Audit"

on:
  workflow_dispatch:
    inputs:
      pkg_url:
        description: 'URL to download the .pkg file for auditing'
        required: true
        type: string
      pkg_path:
        description: 'Path to local .pkg file (alternative to URL)'
        required: false
        type: string
      anthropic_base_url:
        description: 'Override Anthropic API base URL (for OpenRouter, proxy, etc.)'
        required: false
        type: string
        default: 'https://api.anthropic.com'
      openai_base_url:
        description: 'Override OpenAI API base URL'
        required: false
        type: string
        default: 'https://api.openai.com/v1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build audit image
        run: docker build -t pkg-audit .

      - name: Get pkg file
        id: get-pkg
        run: |
          if [ -n "${{ inputs.pkg_url }}" ]; then
            echo "Downloading pkg from URL..."
            curl -sL "${{ inputs.pkg_url }}" -o target.pkg
            echo "path=target.pkg" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.pkg_path }}" ]; then
            echo "Using local pkg: ${{ inputs.pkg_path }}"
            echo "path=${{ inputs.pkg_path }}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No pkg file specified"
            exit 1
          fi
          ls -la target.pkg 2>/dev/null || true

      - name: Run security audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url || vars.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          OPENAI_BASE_URL: ${{ inputs.openai_base_url || vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
        run: |
          mkdir -p output
          docker run --rm \
            -v "$(pwd)/${{ steps.get-pkg.outputs.path }}:/input/input.pkg:ro" \
            -v "$(pwd)/output:/output" \
            -e ANTHROPIC_API_KEY \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_BASE_URL \
            -e OPENAI_BASE_URL \
            pkg-audit

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pkg-audit-report
          path: output/
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## PKG Security Audit Results" >> $GITHUB_STEP_SUMMARY
          if [ -f output/report.md ]; then
            cat output/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No report generated. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
